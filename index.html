<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Passwordle</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#0f0f0f;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

#history{
width:100%;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
max-height:25vh;
overflow:hidden;
}

.mini{
width:70px;
height:70px;
background:#111;
position:relative;
border-radius:8px;
}

.miniDot{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:#444;
}

#game{
position:relative;
width:min(80vmin,500px);
height:min(80vmin,500px);
}

#grid{
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
}

.dot{
width:28%;
height:28%;
border-radius:50%;
background:#333;
margin:auto;
}

.correct{background:#4caf50}
.wrongpos{background:#ffc107}
.wrong{background:#555}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#win{
position:fixed;
inset:0;
background:#000d;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
}
</style>
</head>

<body>

<div id="history"></div>

<div id="game">
<canvas id="line"></canvas>
<div id="grid"></div>
</div>

<div id="win">
<h1>Gewonnen</h1>
<p id="stats"></p>
<button onclick="location.reload()">Neustart</button>
</div>

<script>

const grid=document.getElementById("grid")
const canvas=document.getElementById("line")
const ctx=canvas.getContext("2d")
const history=document.getElementById("history")

let guess=[]
let tries=0
let start=Date.now()

function randomPattern(){
let arr=[0,1,2,3,4,5,6,7,8]
arr.sort(()=>Math.random()-0.5)
return arr
}

let pattern=randomPattern()

for(let i=0;i<9;i++){
let d=document.createElement("div")
d.className="dot"
d.dataset.id=i
grid.appendChild(d)
}

function resize(){
canvas.width=grid.clientWidth
canvas.height=grid.clientHeight
}
resize()
window.onresize=resize

let drawing=false

grid.addEventListener("pointerdown",e=>{
drawing=true
addDot(e)
})

grid.addEventListener("pointermove",e=>{
if(drawing) addDot(e)
})

window.addEventListener("pointerup",()=>drawing=false)

function addDot(e){

let dots=[...document.querySelectorAll(".dot")]

dots.forEach((dot,i)=>{

let r=dot.getBoundingClientRect()

if(
e.clientX>r.left &&
e.clientX<r.right &&
e.clientY>r.top &&
e.clientY<r.bottom
){

if(!guess.includes(i)){
guess.push(i)
drawLines()
}

}

})

if(guess.length==9){
finishAttempt()
}

}

function drawLines(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.lineWidth=6
ctx.strokeStyle="#2196f3"

ctx.beginPath()

guess.forEach((g,i)=>{

let dot=document.querySelectorAll(".dot")[g]
let r=dot.getBoundingClientRect()
let gr=grid.getBoundingClientRect()

let x=r.left-gr.left+r.width/2
let y=r.top-gr.top+r.height/2

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.stroke()

}

function finishAttempt(){

tries++

let result=[]

guess.forEach((g,i)=>{

if(pattern[i]==g) result.push("correct")
else if(pattern.includes(g)) result.push("wrongpos")
else result.push("wrong")

})

saveMini(guess,result)

if(result.every(r=>r=="correct")){
win()
}

resetBoard()

}

function saveMini(guess,result){

let box=document.createElement("div")
box.className="mini"

guess.forEach((g,i)=>{

let dot=document.createElement("div")
dot.className="miniDot "+result[i]

let row=Math.floor(g/3)
let col=g%3

dot.style.left=(col*30+20)+"%"
dot.style.top=(row*30+20)+"%"

box.appendChild(dot)

})

history.prepend(box)

}

function resetBoard(){

guess=[]
ctx.clearRect(0,0,canvas.width,canvas.height)

document.querySelectorAll(".dot").forEach(d=>{
d.className="dot"
})

}

function win(){

let time=Math.floor((Date.now()-start)/1000)

document.getElementById("stats").innerText=
"Zeit: "+time+"s | Versuche: "+tries

document.getElementById("win").style.display="flex"

}

</script>

</body>
</html>
