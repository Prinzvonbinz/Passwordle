<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Passwordle</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:#0f0f0f;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
color:white;
}

#history{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
max-height:25vh;
}

.mini{
width:80px;
height:80px;
background:#111;
border-radius:8px;
position:relative;
}

.mini canvas{
width:100%;
height:100%;
}

#game{
position:relative;
width:min(80vmin,500px);
height:min(80vmin,500px);
}

#grid{
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
}

.dot{
width:28%;
height:28%;
border-radius:50%;
background:#333;
margin:auto;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#win{
position:fixed;
inset:0;
background:#000d;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
}

.correct{color:#4caf50}
.wrongpos{color:#ffc107}
.wrong{color:#666}

</style>
</head>

<body>

<div id="history"></div>

<div id="game">
<canvas id="line"></canvas>
<div id="grid"></div>
</div>

<div id="win">
<h1>Gewonnen</h1>
<p id="stats"></p>
<button onclick="location.reload()">Neustart</button>
</div>

<script>

const grid=document.getElementById("grid")
const canvas=document.getElementById("line")
const ctx=canvas.getContext("2d")
const history=document.getElementById("history")

let guess=[]
let tries=0
let start=Date.now()

function randomPattern(){
let arr=[0,1,2,3,4,5,6,7,8]
return arr.sort(()=>Math.random()-0.5)
}

let pattern=randomPattern()

for(let i=0;i<9;i++){
let d=document.createElement("div")
d.className="dot"
d.dataset.id=i
grid.appendChild(d)
}

function resize(){
canvas.width=grid.clientWidth
canvas.height=grid.clientHeight
}
resize()
window.onresize=resize

let drawing=false

grid.addEventListener("pointerdown",e=>{
drawing=true
addDot(e)
})

grid.addEventListener("pointermove",e=>{
if(drawing) addDot(e)
})

window.addEventListener("pointerup",()=>drawing=false)

function addDot(e){

let dots=[...document.querySelectorAll(".dot")]

dots.forEach((dot,i)=>{

let r=dot.getBoundingClientRect()

if(
e.clientX>r.left &&
e.clientX<r.right &&
e.clientY>r.top &&
e.clientY<r.bottom
){

if(!guess.includes(i)){
guess.push(i)
drawLines()
}

}

})

if(guess.length===9){
setTimeout(finishAttempt,150)
}

}

function drawLines(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.lineWidth=6
ctx.strokeStyle="#2196f3"

ctx.beginPath()

guess.forEach((g,i)=>{

let dot=document.querySelectorAll(".dot")[g]
let r=dot.getBoundingClientRect()
let gr=grid.getBoundingClientRect()

let x=r.left-gr.left+r.width/2
let y=r.top-gr.top+r.height/2

if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.stroke()

}

function finishAttempt(){

tries++

let result=[]

guess.forEach((g,i)=>{

if(pattern[i]===g) result.push("correct")
else if(pattern.includes(g)) result.push("wrongpos")
else result.push("wrong")

})

saveMini(guess,result)

if(result.every(r=>r==="correct")){
win()
return
}

resetBoard()

}

function saveMini(guess,result){

let box=document.createElement("div")
box.className="mini"

let c=document.createElement("canvas")
c.width=80
c.height=80

let cctx=c.getContext("2d")

let pos=[
[20,20],[40,20],[60,20],
[20,40],[40,40],[60,40],
[20,60],[40,60],[60,60]
]

cctx.lineWidth=3

guess.forEach((g,i)=>{

let [x,y]=pos[g]

let color="#666"

if(result[i]==="correct") color="#4caf50"
if(result[i]==="wrongpos") color="#ffc107"

cctx.fillStyle=color
cctx.beginPath()
cctx.arc(x,y,4,0,Math.PI*2)
cctx.fill()

if(i>0){

let [px,py]=pos[guess[i-1]]

cctx.strokeStyle=color
cctx.beginPath()
cctx.moveTo(px,py)
cctx.lineTo(x,y)
cctx.stroke()

}

})

box.appendChild(c)
history.prepend(box)

}

function resetBoard(){

guess=[]
ctx.clearRect(0,0,canvas.width,canvas.height)

}

function win(){

let time=Math.floor((Date.now()-start)/1000)

document.getElementById("stats").innerText=
"Zeit: "+time+" Sekunden | Versuche: "+tries

document.getElementById("win").style.display="flex"

}

</script>

</body>
</html>
