<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Passwordle</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#0f0f0f;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
justify-content:center;
align-items:center;
touch-action:none;
}

#game{
position:relative;
width:min(90vmin,500px);
height:min(90vmin,500px);
}

#grid{
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
}

.dot{
width:28%;
height:28%;
border-radius:50%;
background:#333;
margin:auto;
}

.correct{background:#4caf50}
.wrongpos{background:#ffc107}
.wrong{background:#555}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#win{
position:fixed;
inset:0;
background:#000c;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

#win button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#4caf50;
color:white;
}
</style>
</head>

<body>

<div id="game">
<canvas id="line"></canvas>
<div id="grid"></div>
</div>

<div id="win">
<h1>Gewonnen</h1>
<p id="stats"></p>
<button onclick="location.reload()">Neustart</button>
</div>

<script>

const grid=document.getElementById("grid")
const canvas=document.getElementById("line")
const ctx=canvas.getContext("2d")

let guess=[]
let tries=0
let start=Date.now()

function randomPattern(){
let len=Math.floor(Math.random()*3)+4
let arr=[0,1,2,3,4,5,6,7,8].sort(()=>Math.random()-0.5)
return arr.slice(0,len)
}

let pattern=randomPattern()

for(let i=0;i<9;i++){
let d=document.createElement("div")
d.className="dot"
d.dataset.id=i
grid.appendChild(d)
}

function resizeCanvas(){
canvas.width=grid.clientWidth
canvas.height=grid.clientHeight
}
resizeCanvas()
window.onresize=resizeCanvas

let drawing=false

grid.addEventListener("pointerdown",startDraw)
grid.addEventListener("pointermove",drawMove)
window.addEventListener("pointerup",endDraw)

function startDraw(e){
drawing=true
addDot(e)
}

function drawMove(e){
if(!drawing) return
addDot(e)
}

function endDraw(){
drawing=false
}

function addDot(e){

let dots=[...document.querySelectorAll(".dot")]

dots.forEach((dot,i)=>{

let r=dot.getBoundingClientRect()

if(
e.clientX>r.left &&
e.clientX<r.right &&
e.clientY>r.top &&
e.clientY<r.bottom
){

if(!guess.includes(i)){
guess.push(i)
drawLines()
check()
}

}

})

}

function drawLines(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.lineWidth=6
ctx.strokeStyle="#2196f3"

ctx.beginPath()

guess.forEach((g,i)=>{

let dot=document.querySelectorAll(".dot")[g]
let r=dot.getBoundingClientRect()
let gr=grid.getBoundingClientRect()

let x=r.left-gr.left+r.width/2
let y=r.top-gr.top+r.height/2

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.stroke()

}

function check(){

let dots=document.querySelectorAll(".dot")

guess.forEach((g,i)=>{

let dot=dots[g]

if(pattern[i]==g)
dot.classList.add("correct")

else if(pattern.includes(g))
dot.classList.add("wrongpos")

else
dot.classList.add("wrong")

})

if(JSON.stringify(guess)==JSON.stringify(pattern)) win()

}

function win(){

tries++

let time=Math.floor((Date.now()-start)/1000)

document.getElementById("stats").innerText=
"Zeit: "+time+" Sekunden | Versuche: "+tries

document.getElementById("win").style.display="flex"

}

</script>

</body>
</html>
